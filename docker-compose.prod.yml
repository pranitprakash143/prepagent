version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: prepagent-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-prepagent}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-prepagent_dev}
      POSTGRES_DB: ${DB_NAME:-prepagent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-prepagent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - prepagent-net

  redis:
    image: redis:7-alpine
    container_name: prepagent-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - prepagent-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: prepagent-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-prepagent}:${DB_PASSWORD:-prepagent_dev}@postgres:5432/${DB_NAME:-prepagent_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: production
      RATE_LIMIT_ENABLED: "True"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID_MONTHLY: ${STRIPE_PRICE_ID_MONTHLY}
      STRIPE_PRICE_ID_YEARLY: ${STRIPE_PRICE_ID_YEARLY}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.0-flash}
      LLM_API_KEY: ${LLM_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-gemini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-004}
      USE_S3: ${USE_S3:-False}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - prepagent-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prepagent-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - prepagent-net

  nginx:
    image: nginx:1.25-alpine
    container_name: prepagent-nginx
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - prepagent-net

volumes:
  postgres_data:
  certbot_data:
  certbot_etc:

networks:
  prepagent-net:
    driver: bridge
